spring:
  datasource:
    url: jdbc:mysql://localhost:3306/intern_collector?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

zighang:
  api:
    base-url: https://api.zighang.com/api
    intern-types: 전환형인턴,일반인턴

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL:}

openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini

logging:
  level:
    com.intern.collector: DEBUG
